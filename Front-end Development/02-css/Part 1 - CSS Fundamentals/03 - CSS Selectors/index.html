<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Selectors</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Selectors</h1>

    <h2 class="sub-heading">Learning Different Selectors</h2>

    <p>
        This paragraph is selected using the element selector.
    </p>

    <p class="highlight">
        This paragraph is selected using a class selector.
    </p>

    <p id="special-text">
        This paragraph is selected using an ID selector.
    </p>

</body>

</html>
