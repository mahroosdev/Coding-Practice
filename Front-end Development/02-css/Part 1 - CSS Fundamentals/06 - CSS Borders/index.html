<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Borders</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Borders</h1>

    <section class="solid-border">

        <h2>Solid Border</h2>

        <p>
            This section uses a solid border.
        </p>

    </section>

    <section class="dashed-border">

        <h2>Dashed Border</h2>

        <p>
            This section uses a dashed border.
        </p>

    </section>

    <section class="dotted-border">

        <h2>Dotted Border</h2>

        <p>
            This section uses a dotted border.
        </p>

    </section>

    <section class="rounded-border">

        <h2>Rounded Border</h2>

        <p>
            This section uses rounded corners.
        </p>

    </section>

</body>

</html>
