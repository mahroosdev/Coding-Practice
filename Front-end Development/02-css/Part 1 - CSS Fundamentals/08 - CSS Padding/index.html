<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Padding</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Padding</h1>

    <section class="small-padding">

        <h2>Small Padding</h2>

        <p>
            This section has a small amount of space inside its border.
        </p>

    </section>

    <section class="large-padding">

        <h2>Large Padding</h2>

        <p>
            This section has more space inside its border.
        </p>

    </section>

    <section class="different-padding">

        <h2>Different Padding Values</h2>

        <p>
            This section uses a different padding value on each side.
        </p>

    </section>

</body>

</html>
