<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Width and Height</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Width and Height</h1>

    <section class="small-box">

        <h2>Small Box</h2>

        <p>
            This box has a width of 250 pixels and a height of 120 pixels.
        </p>

    </section>

    <section class="large-box">

        <h2>Large Box</h2>

        <p>
            This box has a width of 500 pixels and a height of 180 pixels.
        </p>

    </section>

    <section class="percentage-box">

        <h2>Percentage Width</h2>

        <p>
            This box uses a percentage value for its width.
        </p>

    </section>

</body>

</html>
