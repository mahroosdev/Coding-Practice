<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Links</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Links</h1>

    <section>

        <h2>Basic Link</h2>

        <p>
            <a class="basic-link" href="https://developer.mozilla.org/">
                Visit MDN Web Docs
            </a>
        </p>

    </section>

    <section>

        <h2>Styled Link</h2>

        <p>
            <a class="styled-link" href="https://www.w3schools.com/">
                Visit W3Schools
            </a>
        </p>

    </section>

    <section>

        <h2>Button Style Link</h2>

        <p>
            <a class="button-link" href="https://github.com/">
                Visit GitHub
            </a>
        </p>

    </section>

</body>

</html>
