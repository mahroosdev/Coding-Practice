<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Tables</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Tables</h1>

    <section>

        <h2>Student Details</h2>

        <table>

            <tr>

                <th>Name</th>

                <th>Course</th>

                <th>Status</th>

            </tr>

            <tr>

                <td>Alex</td>

                <td>HTML</td>

                <td>Completed</td>

            </tr>

            <tr>

                <td>Emma</td>

                <td>CSS</td>

                <td>In Progress</td>

            </tr>

            <tr>

                <td>Noah</td>

                <td>JavaScript</td>

                <td>Planned</td>

            </tr>

        </table>

    </section>

</body>

</html>
