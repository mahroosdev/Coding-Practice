<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Transforms</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Transforms</h1>

    <section>

        <h2>Translate</h2>

        <div class="transform-area">

            <div class="box translate-box">
                Move
            </div>

        </div>

    </section>

    <section>

        <h2>Rotate</h2>

        <div class="transform-area">

            <div class="box rotate-box">
                Rotate
            </div>

        </div>

    </section>

    <section>

        <h2>Scale</h2>

        <div class="transform-area">

            <div class="box scale-box">
                Resize
            </div>

        </div>

    </section>

    <section>

        <h2>Skew</h2>

        <div class="transform-area">

            <div class="box skew-box">
                Skew
            </div>

        </div>

    </section>

    <section>

        <h2>Multiple Transform Values</h2>

        <div class="transform-area">

            <div class="box multiple-transform-box">
                Move and Rotate
            </div>

        </div>

    </section>

</body>

</html>
