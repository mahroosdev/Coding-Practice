<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Media Queries</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>CSS Media Queries</h1>

        <p>
            Resize the browser window to see the design change.
        </p>

    </header>

    <main>

        <section>

            <h2>Responsive Cards</h2>

            <div class="card-container">

                <article class="card">

                    <h3>HTML</h3>

                    <p>
                        HTML creates the structure of a webpage.
                    </p>

                </article>

                <article class="card">

                    <h3>CSS</h3>

                    <p>
                        CSS controls the appearance of a webpage.
                    </p>

                </article>

                <article class="card">

                    <h3>JavaScript</h3>

                    <p>
                        JavaScript adds interaction to a webpage.
                    </p>

                </article>

            </div>

        </section>

    </main>

</body>

</html>
